<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🔥 알파경제맘 프로젝트</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --gold:        #f59e0b;
      --gold-light:  #fde68a;
      --gold-dim:    rgba(245,158,11,0.15);
      --gold-border: rgba(245,158,11,0.3);
      --navy:        #0c1220;
      --card:        #1a2235;
      --card-hover:  #223044;
      --border:      rgba(255,255,255,0.07);
      --text:        #f0f4fa;
      --muted:       #64748b;
      --success:     #10b981;
      --danger:      #ef4444;
      --r:           16px;
      --r-sm:        10px;
      --shadow:      0 4px 24px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: var(--navy);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    /* ===== TYPOGRAPHY ===== */
    .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }

    /* ===== SPINNER ===== */
    .spinner-wrap {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
    }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid var(--gold-border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-label { color: var(--muted); font-size: 13px; }

    /* ===== HEADER ===== */
    .hdr {
      position: sticky; top: 0; z-index: 50;
      background: rgba(12,18,32,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
    }
    .hdr-brand { line-height: 1.2; }
    .hdr-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); letter-spacing: 1px; }
    .hdr-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .hdr-actions { display: flex; gap: 6px; }

    /* ===== BUTTONS ===== */
    .btn {
      display: block; width: 100%;
      border: none; border-radius: var(--r-sm);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all .18s;
    }
    .btn-gold {
      background: var(--gold); color: var(--navy);
      padding: 15px;
    }
    .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-gold:active { transform: translateY(0); }
    .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-outline {
      background: transparent; color: var(--gold);
      border: 1px solid var(--gold-border);
      padding: 13px;
    }
    .btn-outline:hover { background: var(--gold-dim); }

    .btn-ghost {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 13px;
      font-size: 12px;
      border-radius: 8px;
      width: auto;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .btn-icon-gold {
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      padding: 8px 13px;
      font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }
    .btn-icon-gold:hover { background: rgba(245,158,11,0.25); }

    /* ===== FORMS ===== */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.3px; }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 13px 15px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: border-color .18s, background .18s;
    }
    .form-input:focus {
      border-color: var(--gold);
      background: var(--gold-dim);
    }
    .form-input[type="date"] { color-scheme: dark; }
    .err-msg { color: #f87171; font-size: 12px; margin-top: 8px; text-align: center; min-height: 16px; }

    /* ===== CARD ===== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
    }
    .card-gold { border-color: var(--gold-border); }

    /* ===== LOGIN ===== */
    #v-login {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px;
      gap: 32px;
    }
    .login-hero { text-align: center; }
    .login-fire {
      font-size: 68px; line-height: 1; margin-bottom: 14px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px; letter-spacing: 2px; color: var(--gold);
      line-height: 1;
    }
    .login-tagline { font-size: 13px; color: var(--muted); margin-top: 8px; }
    .login-box { width: 100%; max-width: 360px; padding: 26px 22px; }

    /* ===== HOME ===== */
    .home-hero {
      background: linear-gradient(160deg, var(--card) 0%, #162133 100%);
      border-bottom: 1px solid var(--border);
      padding: 22px 18px 24px;
    }
    .greeting { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .username  { font-size: 21px; font-weight: 700; margin-bottom: 20px; }

    .prog-track { background: rgba(255,255,255,0.08); border-radius: 100px; height: 7px; overflow: hidden; margin-bottom: 7px; }
    .prog-bar   { height: 100%; background: linear-gradient(90deg, var(--gold), #fbbf24); border-radius: 100px; transition: width .7s ease; }
    .prog-meta  { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
    .prog-pct   { font-weight: 700; color: var(--gold); }

    /* Day Grid */
    .sec { padding: 20px 16px 0; }
    .sec-title { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 14px; }

    .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 7px; }

    .dc {
      aspect-ratio: 1;
      border-radius: 11px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 1px solid transparent;
      transition: all .18s;
      cursor: pointer;
    }
    .dc-n  { font-family: 'Bebas Neue', sans-serif; font-size: 20px; line-height: 1; }
    .dc-ic { font-size: 12px; margin-top: 1px; }

    .dc-done   { background: rgba(16,185,129,0.14); border-color: rgba(16,185,129,0.3); }
    .dc-done   .dc-n { color: var(--success); }
    .dc-open   { background: var(--gold-dim); border-color: var(--gold-border); }
    .dc-open   .dc-n { color: var(--gold); }
    .dc-open:hover { background: rgba(245,158,11,0.22); transform: scale(1.06); }
    .dc-today  { background: var(--gold); border-color: var(--gold); box-shadow: 0 4px 18px rgba(245,158,11,0.45); }
    .dc-today  .dc-n, .dc-today .dc-ic { color: var(--navy); }
    .dc-today:hover { transform: scale(1.06); }
    .dc-locked { background: rgba(71,85,105,0.2); border-color: rgba(71,85,105,0.2); cursor: not-allowed; }
    .dc-locked .dc-n { color: #3d4f63; }
    .dc-locked .dc-ic { color: #3d4f63; }

    /* Today Card */
    .today-wrap { padding: 14px 16px 24px; }
    .today-card { padding: 20px 18px; }
    .today-hd { margin-bottom: 16px; }
    .today-label { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 3px; }
    .today-date  { font-size: 12px; color: var(--muted); }

    .checks { display: flex; flex-direction: column; gap: 10px; }
    .ck {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 15px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 11px;
      cursor: pointer; transition: all .18s;
    }
    .ck:hover { background: rgba(255,255,255,0.07); }
    .ck.ck-on  { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); }
    .ck-box {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0; transition: all .18s;
    }
    .ck.ck-on .ck-box { background: var(--success); border-color: var(--success); }
    .ck-em  { font-size: 18px; flex-shrink: 0; }
    .ck-lbl { font-size: 14px; font-weight: 500; flex: 1; }

    .share-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      border-radius: 10px; padding: 11px 13px;
    }
    .share-txt { font-size: 12px; color: var(--gold-light); flex: 1; white-space: pre-line; line-height: 1.6; word-break: keep-all; }
    .copy-btn  {
      background: var(--gold); color: var(--navy);
      border: none; border-radius: 7px;
      padding: 8px 12px; font-size: 12px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
      white-space: nowrap; flex-shrink: 0; transition: all .18s;
    }
    .copy-btn:hover { background: var(--gold-light); }

    /* Spacer */
    .pb32 { height: 32px; }

    /* ===== MODAL SHEET ===== */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fade-in .2s ease;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .sheet {
      background: var(--card);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid var(--gold-border);
      padding: 20px 20px 48px;
      width: 100%; max-width: 480px;
      animation: slide-up .28s ease;
    }
    @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .drag-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.18); margin: 0 auto 20px;
    }
    .sheet-day  { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: var(--gold); line-height: 1; }
    .sheet-date { font-size: 12px; color: var(--muted); margin-bottom: 22px; }

    /* ===== STATS ===== */
    .stats-hero {
      background: linear-gradient(160deg, var(--card) 0%, #16203a 100%);
      border-bottom: 1px solid var(--border);
      padding: 32px 20px; text-align: center;
    }
    .badge-ring {
      width: 86px; height: 86px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #b45309);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 42px; line-height: 1;
      box-shadow: 0 0 0 4px rgba(245,158,11,0.2), 0 0 32px rgba(245,158,11,0.3);
      animation: glow 2.5s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 4px rgba(245,158,11,0.2), 0 0 24px rgba(245,158,11,0.25); }
      50%      { box-shadow: 0 0 0 6px rgba(245,158,11,0.25), 0 0 44px rgba(245,158,11,0.45); }
    }
    .stats-uname { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .stats-sub   { font-size: 13px; color: var(--muted); }

    .sg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px 16px 0; }
    .sc { padding: 18px 14px; text-align: center; }
    .sc.full { grid-column: span 2; }
    .sv { font-family: 'Bebas Neue', sans-serif; font-size: 50px; color: var(--gold); line-height: 1; }
    .sl { font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 3px; }

    .bar-sec { padding: 20px 16px 8px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; }
    .bar-lbl { font-size: 12px; color: var(--muted); width: 56px; flex-shrink: 0; }
    .bar-track { flex: 1; height: 9px; background: rgba(255,255,255,0.07); border-radius: 100px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 100px; transition: width .8s ease; }
    .bf-v  { background: #3b82f6; }
    .bf-w  { background: #8b5cf6; }
    .bf-a  { background: var(--success); }
    .bar-pct { font-size: 12px; font-weight: 700; color: var(--gold); width: 34px; text-align: right; }

    .trophy-card {
      margin: 16px;
      padding: 24px 20px; text-align: center;
      background: linear-gradient(135deg, var(--gold-dim), rgba(245,158,11,0.06));
      border: 1px solid var(--gold-border); border-radius: var(--r);
    }
    .trophy-ic  { font-size: 48px; margin-bottom: 10px; }
    .trophy-ttl { font-size: 17px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
    .trophy-txt { font-size: 13px; color: var(--muted); line-height: 1.6; }

    /* ===== ADMIN ===== */
    .admin-hero {
      background: linear-gradient(160deg, var(--card) 0%, #15202e 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 18px 16px;
    }
    .tag {
      display: inline-block;
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      color: var(--gold); border-radius: 5px;
      padding: 3px 9px; font-size: 10px; font-weight: 700; letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .admin-title { font-size: 19px; font-weight: 700; }

    .asg { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 14px 16px; }
    .asc { padding: 14px 10px; text-align: center; }
    .asv { font-family: 'Bebas Neue', sans-serif; font-size: 34px; color: var(--gold); line-height: 1; }
    .asl { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* Tabs */
    .tabs { display: flex; gap: 7px; padding: 6px 16px 12px; overflow-x: auto; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 100px; padding: 8px 16px;
      font-size: 12px; font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; white-space: nowrap; transition: all .18s;
    }
    .tab-btn.active {
      background: var(--gold); border-color: var(--gold);
      color: var(--navy); font-weight: 700;
    }

    /* Participant rows */
    .p-row {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 15px; margin-bottom: 8px;
    }
    .p-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .p-name { font-size: 14px; font-weight: 700; }
    .p-rate { font-size: 13px; font-weight: 700; color: var(--gold); }
    .p-dots { display: flex; gap: 3px; flex-wrap: wrap; }
    .dot {
      width: 17px; height: 17px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
    }
    .dot-ok    { background: rgba(16,185,129,0.25); color: var(--success); }
    .dot-part  { background: rgba(245,158,11,0.2); color: var(--gold); }
    .dot-miss  { background: rgba(255,255,255,0.06); color: var(--muted); }
    .dot-lock  { background: rgba(71,85,105,0.15); color: #3d4f63; }

    /* Overview table */
    .tbl-wrap { overflow-x: auto; padding: 0 16px 20px; }
    .ov-tbl { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 560px; }
    .ov-tbl th {
      background: rgba(255,255,255,0.04); color: var(--muted);
      padding: 8px 5px; text-align: center;
      border-bottom: 1px solid var(--border);
      font-weight: 600; white-space: nowrap;
    }
    .ov-tbl th:first-child { text-align: left; padding-left: 8px; }
    .ov-tbl td { padding: 7px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .ov-tbl td:first-child { text-align: left; padding-left: 8px; font-weight: 600; white-space: nowrap; }
    .ov-tbl tr:hover td { background: rgba(255,255,255,0.02); }
    .ov-tbl .rate-cell { font-weight: 700; color: var(--gold); }

    /* Create form */
    .create-wrap { padding: 16px; }
    .create-card { padding: 20px 18px; }
    .create-title { font-size: 15px; font-weight: 700; color: var(--gold); margin-bottom: 16px; }
    .notice {
      margin-top: 12px; padding: 13px 14px;
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      border-radius: 10px;
    }
    .notice p { font-size: 12px; color: var(--muted); line-height: 1.75; }
    .notice strong { color: var(--gold-light); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b; border: 1px solid var(--border);
      color: var(--text); border-radius: 12px;
      padding: 13px 20px; font-size: 14px; font-weight: 500;
      z-index: 999; transition: transform .3s ease;
      white-space: nowrap; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .toast.show  { transform: translateX(-50%) translateY(0); }
    .toast.ok    { border-color: rgba(16,185,129,0.45); }
    .toast.fail  { border-color: rgba(239,68,68,0.45); }

    /* Helpers */
    .mt8  { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
    .mt16 { margin-top: 16px; }
    .mt20 { margin-top: 20px; }
    .p16  { padding: 16px; }
    .p20  { padding: 0 16px 20px; }
    .w100 { width: 100%; }
    .flex-row { display: flex; gap: 8px; align-items: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .text-center { text-align: center; }
    .text-muted  { color: var(--muted); font-size: 13px; }
    .empty { padding: 32px 20px; text-align: center; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<div id="app"><div class="spinner-wrap"><div class="spinner"></div><p class="spinner-label">잠시만요...</p></div></div>
<div class="toast" id="toast"></div>
<div id="modal-root"></div>


<script>
/* =====================================================
   ⚙️  SUPABASE 설정
   ===================================================== */
const SUPA_URL  = 'https://mltdetvjdrvbeaeqvczp.supabase.co';
const SUPA_ANON = 'YOUR_SUPABASE_ANON_KEY';
/* ===================================================== */

let db = null;

/* ──────── STATE ──────── */
let S = {
  user: null,
  profile: null,
  checks: [],
  participants: [],
  allChecks: [],
  view: 'loading',
  adminTab: 'dash',
};

/* ──────── UTILS ──────── */
const $ = id => document.getElementById(id);
const app = () => $('app');

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(s) {
  const d = new Date(s+'T00:00:00');
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}
function daysBetween(a,b) {
  return Math.floor((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);
}
function maxUnlocked(sd) {
  if (!sd) return 0;
  return Math.min(Math.max(daysBetween(sd, today())+1, 0), 14);
}
function getCheck(day) {
  return S.checks.find(c=>c.day===day) || {video_done:false,writing_done:false,action_done:false};
}
function allDone(c) { return c&&c.video_done&&c.writing_done&&c.action_done; }
function shareText(day,c) {
  return `알파경제맘 프로젝트 Day${day} ${allDone(c)?'완료!':'진행중'}\n영상${c.video_done?'✅':'⬜'} 필사${c.writing_done?'✅':'⬜'} 행동${c.action_done?'✅':'⬜'}${allDone(c)?' 🔥':''}`;
}
async function copyText(txt) {
  try { await navigator.clipboard.writeText(txt); toast('📋 복사했어요!','ok'); }
  catch { toast('복사 실패','fail'); }
}
function toast(msg,type='') {
  const el=$('toast'); el.textContent=msg; el.className=`toast show ${type}`;
  clearTimeout(window._tt); window._tt=setTimeout(()=>{el.className='toast';},2600);
}
function computeStats(checks) {
  let total=0,v=0,w=0,a=0,streak=0,max=0;
  for(let d=1;d<=14;d++){
    const c=checks.find(x=>x.day===d)||{};
    const full=c.video_done&&c.writing_done&&c.action_done;
    if(full){total++;streak++;max=Math.max(max,streak);}else{streak=0;}
    if(c.video_done)v++; if(c.writing_done)w++; if(c.action_done)a++;
  }
  return {total,rate:Math.round(total/14*100),vRate:Math.round(v/14*100),wRate:Math.round(w/14*100),aRate:Math.round(a/14*100),max};
}

/* 이름 → 가짜 이메일 변환 (Supabase Auth용) */
function nameToEmail(name) {
  const slug = name.replace(/\s/g,'').toLowerCase();
  return `${slug}@alphamom.app`;
}

/* ──────── DB ──────── */
async function loadProfile() {
  const {data} = await db.from('profiles').select('*').eq('id',S.user.id).single();
  S.profile = data;
}
async function loadMyChecks() {
  const {data} = await db.from('daily_checks').select('*').eq('user_id',S.user.id);
  S.checks = data||[];
}
async function upsertCheck(day,v,w,a) {
  await db.from('daily_checks').upsert({
    user_id:S.user.id, day, video_done:v, writing_done:w, action_done:a, updated_at:new Date().toISOString()
  },{onConflict:'user_id,day'});
  await loadMyChecks();
}
async function loadAdminData() {
  const [{data:p},{data:c}] = await Promise.all([
    db.from('profiles').select('*').eq('role','participant').order('name'),
    db.from('daily_checks').select('*')
  ]);
  S.participants=p||[]; S.allChecks=c||[];
}
function exportCSV() {
  const rows=[['이름','Day','영상','필사','행동','전체완료']];
  S.participants.forEach(p=>{
    for(let d=1;d<=14;d++){
      const c=S.allChecks.find(x=>x.user_id===p.id&&x.day===d);
      rows.push([p.name,d,c?.video_done?'O':'',c?.writing_done?'O':'',c?.action_done?'O':'',(c?.video_done&&c?.writing_done&&c?.action_done)?'O':'']);
    }
  });
  const csv='\uFEFF'+rows.map(r=>r.join(',')).join('\r\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),download:`알파경제맘_${today()}.csv`});
  a.click();
}

async function doUserLogin() {
  const name = $('u-name').value;
  const code = $('u-code').value.trim();
  const err  = $('u-err');
  err.textContent='';
  if(!name){err.textContent='이름을 선택해주세요.';return;}
  if(!code){err.textContent='참여 코드를 입력해주세요.';return;}
  const btn=$('u-btn'); btn.textContent='확인 중...'; btn.disabled=true;
  const email = nameToEmail(name);
  const pw    = `alphamom_${code}`;
  const {data,error} = await db.auth.signInWithPassword({email,password:pw});
  if(error){
    err.textContent='코드가 올바르지 않아요. 관리자에게 확인해주세요.';
    btn.textContent='🔥 입장하기'; btn.disabled=false; return;
  }
  S.user=data.user;
  await loadProfile();
  await loadMyChecks();
  const st=computeStats(S.checks);
  if(st.total===14&&!localStorage.getItem('stats-seen-'+S.user.id)){
    localStorage.setItem('stats-seen-'+S.user.id,'1');
    S.view='stats';
  } else { S.view='home'; }
  render();
}

async function doAdminLogin() {
  const email=$('a-email').value.trim();
  const pw=$('a-pw').value;
  const err=$('a-err');
  err.textContent='';
  if(!email||!pw){err.textContent='이메일과 비밀번호를 입력해주세요.';return;}
  const btn=$('a-btn'); btn.textContent='로그인 중...'; btn.disabled=true;
  const {data,error}=await db.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent='로그인 실패. 이메일/비밀번호를 확인해주세요.';btn.textContent='로그인';btn.disabled=false;return;}
  S.user=data.user;
  await loadProfile();
  if(S.profile?.role==='admin'){await renderAdmin();}
  else{err.textContent='관리자 계정이 아니에요.';btn.textContent='로그인';btn.disabled=false;await db.auth.signOut();}
}

function ckHtml(type,on,em,lbl,ctx){
  return `<div class="ck ${on?'ck-on':''}" onclick="toggleCk('${type}','${ctx}')">
    <div class="ck-box">${on?'✓':''}</div><span class="ck-em">${em}</span><span class="ck-lbl">${lbl}</span>
  </div>`;
}

function toggleCk(type,ctx){
  const key=type+'_done';
  if(ctx==='home'){
    const sd=S.profile.start_date||today(); const mu=maxUnlocked(sd);
    let ex=S.checks.find(c=>c.day===mu);
    if(!ex){ex={day:mu,video_done:false,writing_done:false,action_done:false};S.checks.push(ex);}
    ex[key]=!ex[key]; renderHome();
  } else {
    _mTemp[key]=!_mTemp[key]; openDay(_mDay);
  }
}

}

  if(tab==='stat') body.innerHTML=tabStat();

function tabDash(){
  if(!S.participants.length) return `<div class="empty">아직 참여자가 없어요</div>`;
  const pRows=S.participants.map(p=>{
    const mu=maxUnlocked(p.start_date);
    const done=S.allChecks.filter(c=>c.user_id===p.id&&allDone(c)).length;
    const rate=mu>0?Math.round(done/Math.min(mu,14)*100):0;
    let dots='';
    for(let d=1;d<=14;d++){
      const c=S.allChecks.find(x=>x.user_id===p.id&&x.day===d);
      const locked=d>mu;
      if(locked) dots+=`<div class="dot dot-lock" title="Day${d}">🔒</div>`;
      else if(allDone(c)) dots+=`<div class="dot dot-ok" title="Day${d}">✅</div>`;
      else if(c&&(c.video_done||c.writing_done||c.action_done)) dots+=`<div class="dot dot-part" title="Day${d}">🔶</div>`;
      else dots+=`<div class="dot dot-miss" title="Day${d}"></div>`;
    }
    return `<div class="p-row"><div class="p-top"><span class="p-name">${p.name}</span><span class="p-rate">${done}/14 (${rate}%)</span></div><div class="p-dots">${dots}</div></div>`;
  }).join('');

  const tRows=S.participants.map(p=>{
    const mu=maxUnlocked(p.start_date);
    const cells=Array.from({length:14},(_,i)=>i+1).map(d=>{
      const c=S.allChecks.find(x=>x.user_id===p.id&&x.day===d);
      if(d>mu) return `<td>🔒</td>`;
      if(!c) return `<td style="color:var(--muted)">-</td>`;
      return allDone(c)?`<td>✅</td>`:`<td>🔶</td>`;
    }).join('');
    const done=S.allChecks.filter(c=>c.user_id===p.id&&allDone(c)).length;
    return `<tr><td>${p.name}</td>${cells}<td class="rate-cell">${done}/14</td></tr>`;
  }).join('');

  return `
  <div class="p20">${pRows}</div>
  <div class="tbl-wrap">
    <div class="sec-title" style="margin-bottom:10px">전체 현황표</div>
    <table class="ov-tbl">
      <thead><tr><th>이름</th>${Array.from({length:14},(_,i)=>`<th>D${i+1}</th>`).join('')}<th>합계</th></tr></thead>
      <tbody>${tRows}</tbody>
    </table>
  </div>
  <div class="p16"><button class="btn btn-outline" onclick="exportCSV()">📥 CSV 다운로드</button></div>`;
}

function tabStat(){
  const totalP=S.participants.length||1;
  const base=totalP*14;
  const v=S.allChecks.filter(c=>c.video_done).length;
  const w=S.allChecks.filter(c=>c.writing_done).length;
  const a=S.allChecks.filter(c=>c.action_done).length;
  const dailyRows=Array.from({length:14},(_,i)=>i+1).map(d=>{
    const done=S.allChecks.filter(c=>c.day===d&&allDone(c)).length;
    const r=Math.round(done/totalP*100);
    return `<div class="bar-row"><div class="bar-lbl">Day ${d}</div><div class="bar-track"><div class="bar-fill bf-a" style="width:${r}%"></div></div><div class="bar-pct">${r}%</div></div>`;
  }).join('');
  return `<div class="p16">
    <div class="sec-title">과제별 완료율</div>
    <div class="bar-row"><div class="bar-lbl">📹 영상</div><div class="bar-track"><div class="bar-fill bf-v" style="width:${Math.round(v/base*100)}%"></div></div><div class="bar-pct">${Math.round(v/base*100)}%</div></div>
    <div class="bar-row"><div class="bar-lbl">✏️ 필사</div><div class="bar-track"><div class="bar-fill bf-w" style="width:${Math.round(w/base*100)}%"></div></div><div class="bar-pct">${Math.round(w/base*100)}%</div></div>
    <div class="bar-row"><div class="bar-lbl">💪 행동</div><div class="bar-track"><div class="bar-fill bf-a" style="width:${Math.round(a/base*100)}%"></div></div><div class="bar-pct">${Math.round(a/base*100)}%</div></div>
    <div class="sec-title mt20">일자별 참여율</div>${dailyRows}
  </div>`;
}

function tabCreate(){
  return `<div class="create-wrap">
    <div class="card create-card">
      <div class="create-title">➕ 참여자 추가</div>
      <div class="form-group">
        <label class="form-label">이름</label>
        <input class="form-input" id="cn-name" type="text" placeholder="홍길동" />
      </div>
      <div class="form-group">
        <label class="form-label">참여 코드 (숫자 4자리)</label>
        <input class="form-input" id="cn-code" type="number" placeholder="1234" maxlength="4" inputmode="numeric" />
      </div>
      <div class="form-group">
        <label class="form-label">챌린지 시작일</label>
        <input class="form-input" id="cn-start" type="date" value="${today()}" />
      </div>
      <p class="err-msg" id="cn-err"></p>
      <button class="btn btn-gold" id="cn-btn" onclick="doCreateUser()">참여자 추가</button>
    </div>
    <div class="notice mt12">
      <p>💡 참여자는 <strong>이름 선택 + 참여 코드</strong>로 로그인해요.<br>
      코드는 관리자가 카톡으로 전달해주세요.</p>
    </div>
  </div>`;
}

async function doCreateUser(){
  const name=$('cn-name').value.trim();
  const code=$('cn-code').value.trim();
  const start=$('cn-start').value;
  const err=$('cn-err');
  err.textContent='';
  if(!name){err.textContent='이름을 입력해주세요.';return;}
  if(!code||code.length>4){err.textContent='4자리 숫자 코드를 입력해주세요.';return;}
  if(!start){err.textContent='시작일을 선택해주세요.';return;}

  const btn=$('cn-btn'); btn.textContent='추가 중...'; btn.disabled=true;
  const email=nameToEmail(name);
  const pw=`alphamom_${code}`;

  // 관리자 세션 저장
  const {data:sess}=await db.auth.getSession();
  const adminSess=sess.session;

  try{
    const {data:newU,error}=await db.auth.signUp({email,password:pw,options:{data:{name,role:'participant'}}});
    if(error) throw error;

    // 관리자 세션 복원
    await db.auth.setSession({access_token:adminSess.access_token,refresh_token:adminSess.refresh_token});

    if(newU.user){
      await new Promise(r=>setTimeout(r,800));
      await db.from('profiles').update({start_date:start,name}).eq('id',newU.user.id);
    }
    toast(`✅ ${name}님 추가 완료! (코드: ${code})`,'ok');
    $('cn-name').value=''; $('cn-code').value='';
    await renderAdmin(); switchTab('dash');
  }catch(e){
    // 세션 복원 시도
    if(adminSess) await db.auth.setSession({access_token:adminSess.access_token,refresh_token:adminSess.refresh_token});
    err.textContent='오류: '+(e.message||'다시 시도해주세요.');
    btn.textContent='참여자 추가'; btn.disabled=false;
  }
}

/* ──────── Supabase 동적 로드 ──────── */
function loadSupabaseScript(){
  return new Promise((resolve,reject)=>{
    if(window.supabase&&window.supabase.createClient){resolve();return;}
    const urls=['https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js','https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js'];
    let idx=0;
    function tryNext(){
      if(idx>=urls.length){reject(new Error('CDN load failed'));return;}
      const s=document.createElement('script'); s.src=urls[idx++];
      s.onload=()=>{if(window.supabase&&window.supabase.createClient)resolve();else tryNext();};
      s.onerror=()=>tryNext();
      document.head.appendChild(s);
    }
    tryNext();
  });
}

function renderSetupGuide(){
  app().innerHTML=`
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:24px;">
    <div style="font-size:52px">⚙️</div>
    <div style="text-align:center">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);margin-bottom:8px">Supabase 설정 필요</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.8">index.html 상단의 두 줄에<br>Supabase URL과 anon key를 입력해주세요</div>
    </div>
  </div>`;
}

/* ──────── INIT ──────── */
async function init(){
  try{ await loadSupabaseScript(); }
  catch(e){
    app().innerHTML=`<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:16px;text-align:center;">
      <div style="font-size:48px">⚠️</div>
      <div style="color:var(--gold);font-size:20px;font-weight:700;">라이브러리 로드 실패</div>
      <div style="color:var(--muted);font-size:13px;">인터넷 연결 확인 후 새로고침 해주세요</div>
      <button onclick="location.reload()" style="background:var(--gold);color:var(--navy);border:none;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;">🔄 새로고침</button>
    </div>`;
    return;
  }
  if(!SUPA_URL||SUPA_URL.startsWith('YOUR')||!SUPA_ANON||SUPA_ANON.startsWith('YOUR')){renderSetupGuide();return;}
  try{ db=window.supabase.createClient(SUPA_URL,SUPA_ANON); }
  catch(e){renderSetupGuide();return;}

  const withTimeout=(p,ms)=>Promise.race([p,new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),ms))]);
  try{
    const {data:{session}}=await withTimeout(db.auth.getSession(),5000);
    if(session){
      S.user=session.user;
      await loadProfile();
      if(S.profile?.role==='admin') await renderAdmin();
      else if(S.profile){
        await loadMyChecks();
        const st=computeStats(S.checks);
        if(st.total===14&&!localStorage.getItem('stats-seen-'+S.user.id)){localStorage.setItem('stats-seen-'+S.user.id,'1');S.view='stats';}
        else S.view='home';
        render();
      } else {S.view='login';render();}
    } else {S.view='login';render();}
  }catch(e){console.error(e);S.view='login';render();}

  db.auth.onAuthStateChange(ev=>{if(ev==='SIGNED_OUT'){S.view='login';render();}});
}
init();
</script>
